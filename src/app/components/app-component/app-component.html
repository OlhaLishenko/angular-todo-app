<div class="todoapp">
  @let todos = (todos$ | async) ?? [];

  <h1 class="todoapp__title">todos {{ todos.length }}</h1>

  <div class="todoapp__content">
    <header class="todoapp__header">
      <button type="button" class="todoapp__toggle-all active"></button>
      <app-todo-form (addTodo)="addTodo($event)"></app-todo-form>
    </header>

    <section class="todoapp__main">
      @for (todo of (filteredTodos$ | async) ?? []; track todo.id) {
        <app-todo
          [todo]="todo"
          (deleteTodo)="deleteTodo($event)"
          (toggle)="toggle($event)"
          (renameTodo)="renameTodo($event)"
        ></app-todo>
      }
    </section>

    <footer class="todoapp__footer">
      <span class="todo-count"> {{ count$ | async }} items left </span>

      <nav class="filter">
        <a
          routerLink="/all"
          class="filter__link"
          [class.selected]="(filter$ | async) === 'all'"
          >All</a
        >
        <a
          routerLink="/active"
          class="filter__link"
          [class.selected]="(filter$ | async) === 'active'"
          >Active</a
        >
        <a
          routerLink="/completed"
          class="filter__link"
          [class.selected]="(filter$ | async) === 'completed'"
          >Completed</a
        >
      </nav>

      <button
        type="button"
        class="todoapp__clear-completed"
        (click)="deleteCompleted()"
      >
        Clear completed
      </button>
    </footer>
  </div>
  <app-message [message]="error$ | async"></app-message>
</div>
