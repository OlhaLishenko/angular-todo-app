<div class="todoapp">
  <h1 class="todoapp__title">todos {{ todos.length }}</h1>

  <div class="todoapp__content">
    <header class="todoapp__header">
      <button type="button" class="todoapp__toggle-all active"></button>
      <app-todo-form (addTodo)="addTodo($event)"></app-todo-form>
    </header>

    <section class="todoapp__main">
      @for (todo of todos; track todo.id) {
        <app-todo
          [todo]="todo"
          (deleteTodo)="deleteTodo($event)"
          (toggle)="toggle($event)"
          (renameTodo)="renameTodo($event)"
        ></app-todo>
      }
    </section>

    <footer class="todoapp__footer">
      <span class="todo-count"> {{ activeTodos.length }} items left </span>

      <nav class="filter">
        <a href="#/" class="filter__link selected"> All </a>

        <a href="#/active" class="filter__link"> Active </a>

        <a href="#/completed" class="filter__link"> Completed </a>
      </nav>

      <button
        type="button"
        class="todoapp__clear-completed"
        data-cy="ClearCompletedButton"
      >
        Clear completed
      </button>
    </footer>
  </div>
